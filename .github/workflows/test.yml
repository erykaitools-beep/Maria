name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest agent_core/tests/ -q --tb=short -x

      - name: Smoke test imports
        run: |
          python -c "from agent_core.homeostasis.core import HomeostasisCore; print('OK: HomeostasisCore')"
          python -c "from agent_core.planner.planner_core import PlannerCore; print('OK: PlannerCore')"
          python -c "from agent_core.proactive import ProactiveScheduler; print('OK: ProactiveScheduler')"
          python -c "from agent_core.consciousness.user_profile import UserProfile; print('OK: UserProfile')"
