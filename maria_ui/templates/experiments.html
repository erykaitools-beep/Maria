<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.A.R.I.A. - Experiments</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .header-left h1 { font-size: 2em; color: #00d4ff; text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .header-left .subtitle { color: #888; font-size: 0.85em; }
        .header-right { display: flex; gap: 15px; }
        .nav-btn {
            background: rgba(255,255,255,0.1); border: none; color: #aaa;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-size: 0.9em; text-decoration: none; transition: all 0.3s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .nav-btn.primary { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }

        .section { margin-bottom: 30px; }
        .section h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.3em; }

        .card {
            background: rgba(255,255,255,0.05); border-radius: 12px;
            padding: 20px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card:hover { border-color: rgba(0, 212, 255, 0.2); }

        .status-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 0.8em; font-weight: bold; text-transform: uppercase;
        }
        .badge-draft { background: rgba(255,255,255,0.1); color: #888; }
        .badge-proposed { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .badge-approved { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .badge-rejected { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        .badge-expired { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }

        .rec-adopt { color: #4caf50; font-weight: bold; }
        .rec-reject { color: #f44336; font-weight: bold; }
        .rec-inconclusive { color: #ffc107; font-weight: bold; }

        .risk-low { color: #4caf50; }
        .risk-medium { color: #ffc107; }
        .risk-high { color: #f44336; }

        .proposal-meta { color: #888; font-size: 0.85em; margin: 5px 0; }
        .proposal-hypothesis { color: #ccc; margin: 8px 0; }
        .proposal-change {
            font-family: monospace; background: rgba(0,0,0,0.3);
            padding: 5px 10px; border-radius: 6px; display: inline-block; margin: 5px 0;
        }

        .btn {
            padding: 6px 14px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 0.85em; transition: all 0.2s;
            margin-right: 8px;
        }
        .btn-approve { background: rgba(76, 175, 80, 0.3); color: #4caf50; }
        .btn-approve:hover { background: rgba(76, 175, 80, 0.5); }
        .btn-reject { background: rgba(244, 67, 54, 0.3); color: #f44336; }
        .btn-reject:hover { background: rgba(244, 67, 54, 0.5); }
        .btn-detail { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
        .btn-detail:hover { background: rgba(0, 212, 255, 0.4); }

        .comment-input {
            display: none; margin-top: 10px;
        }
        .comment-input textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
            color: #eee; border-radius: 6px; padding: 8px; resize: vertical;
            min-height: 60px; font-family: inherit;
        }
        .comment-input .btn { margin-top: 5px; }
        .comments-list { margin-top: 10px; }
        .comment-item {
            background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px;
            margin-top: 5px; font-size: 0.9em;
        }
        .comment-author { color: #00d4ff; font-weight: bold; }
        .comment-time { color: #666; font-size: 0.8em; }

        .metrics-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; margin: 10px 0;
        }
        .metric-item {
            background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px;
            text-align: center;
        }
        .metric-label { color: #888; font-size: 0.8em; }
        .metric-value { font-size: 1.1em; font-weight: bold; }
        .metric-delta { font-size: 0.9em; }
        .delta-positive { color: #4caf50; }
        .delta-negative { color: #f44336; }

        .params-table { width: 100%; border-collapse: collapse; }
        .params-table th {
            text-align: left; padding: 8px; color: #888;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .params-table td {
            padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .empty-state { text-align: center; color: #666; padding: 40px; }

        .tab-bar { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab {
            padding: 8px 20px; background: rgba(255,255,255,0.05);
            border: none; color: #888; border-radius: 8px 8px 0 0;
            cursor: pointer; font-size: 0.9em;
        }
        .tab.active { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .toast {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px;
            border-radius: 8px; z-index: 1000; display: none;
            animation: fadeIn 0.3s;
        }
        .toast-success { background: rgba(76, 175, 80, 0.9); }
        .toast-error { background: rgba(244, 67, 54, 0.9); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>M.A.R.I.A. Experiments</h1>
                <p class="subtitle">K11 - Autonomiczny tuning parametrow</p>
            </div>
            <div class="header-right">
                <a href="/" class="nav-btn">Chat</a>
                <a href="/status" class="nav-btn">Status</a>
                <a href="/architecture" class="nav-btn">Architecture</a>
                <a href="/logout" class="nav-btn">Wyloguj</a>
            </div>
        </header>

        <div class="tab-bar">
            <button class="tab active" onclick="switchTab('proposals')">Propozycje</button>
            <button class="tab" onclick="switchTab('reports')">Raporty</button>
            <button class="tab" onclick="switchTab('params')">Parametry</button>
        </div>

        <!-- Proposals tab -->
        <div id="tab-proposals" class="tab-content active">
            <div class="section">
                <h2>Propozycje zmian parametrow</h2>
                <div id="proposals-list">
                    <div class="empty-state">Ladowanie...</div>
                </div>
            </div>
        </div>

        <!-- Reports tab -->
        <div id="tab-reports" class="tab-content">
            <div class="section">
                <h2>Raporty z eksperymentow</h2>
                <div id="reports-list">
                    <div class="empty-state">Ladowanie...</div>
                </div>
            </div>
        </div>

        <!-- Params tab -->
        <div id="tab-params" class="tab-content">
            <div class="section">
                <h2>Dostepne parametry do tuningu</h2>
                <div id="params-list">
                    <div class="empty-state">Ladowanie...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Tab switching
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
        }

        // Toast notification
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast toast-' + type;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // Format timestamp
        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts * 1000);
            return d.toLocaleDateString('pl') + ' ' + d.toLocaleTimeString('pl', {hour:'2-digit', minute:'2-digit'});
        }

        // Badge class for status
        function statusBadge(status) {
            return 'badge-' + status;
        }

        // Approve proposal
        function approveProposal(id) {
            fetch('/api/experiments/approve/' + id, {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showToast('Propozycja zatwierdzona', 'success');
                        loadProposals();
                    } else {
                        showToast(data.message || 'Blad', 'error');
                    }
                });
        }

        // Reject proposal
        function rejectProposal(id) {
            fetch('/api/experiments/reject/' + id, {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showToast('Propozycja odrzucona', 'success');
                        loadProposals();
                    } else {
                        showToast(data.message || 'Blad', 'error');
                    }
                });
        }

        // Toggle comment input
        function toggleComment(id) {
            const el = document.getElementById('comment-' + id);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        // Submit comment
        function submitComment(id) {
            const textarea = document.querySelector('#comment-' + id + ' textarea');
            const text = textarea.value.trim();
            if (!text) return;

            fetch('/api/experiments/comment/' + id, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast('Uwaga dodana', 'success');
                    textarea.value = '';
                    loadProposals();
                } else {
                    showToast(data.message || 'Blad', 'error');
                }
            });
        }

        // Load proposals
        function loadProposals() {
            fetch('/api/experiments/proposals')
                .then(r => r.json())
                .then(proposals => {
                    const el = document.getElementById('proposals-list');
                    if (!proposals.length) {
                        el.innerHTML = '<div class="empty-state">Brak propozycji. System automatycznie wygeneruje propozycje na podstawie obserwacji K4/K9.</div>';
                        return;
                    }

                    // Show newest first
                    proposals.reverse();
                    el.innerHTML = proposals.map(p => {
                        const canAct = p.status === 'draft' || p.status === 'proposed';
                        const commentsHtml = (p.comments || []).map(c =>
                            '<div class="comment-item">' +
                            '<span class="comment-author">' + (c.author || 'user') + '</span> ' +
                            '<span class="comment-time">' + formatTime(c.timestamp) + '</span>' +
                            '<br>' + c.text +
                            '</div>'
                        ).join('');

                        return '<div class="card">' +
                            '<div style="display:flex;justify-content:space-between;align-items:center">' +
                            '<div><span class="status-badge ' + statusBadge(p.status) + '">' + p.status + '</span> ' +
                            '<span style="color:#888;font-size:0.8em">' + p.proposal_id + '</span></div>' +
                            '<span class="proposal-meta">' + formatTime(p.timestamp) + '</span></div>' +
                            '<div class="proposal-change">' + p.parameter_id + ': ' + p.current_value + ' &rarr; ' + p.proposed_value + '</div>' +
                            '<div class="proposal-hypothesis">' + p.hypothesis + '</div>' +
                            '<div class="proposal-meta">Zrodlo: ' + p.source + ' | Ryzyko: ' + (p.risk_assessment || '-') + '</div>' +
                            (canAct ? '<div style="margin-top:10px">' +
                                '<button class="btn btn-approve" onclick="approveProposal(\'' + p.proposal_id + '\')">Zatwierdz</button>' +
                                '<button class="btn btn-reject" onclick="rejectProposal(\'' + p.proposal_id + '\')">Odrzuc</button>' +
                                '<button class="btn btn-detail" onclick="toggleComment(\'' + p.proposal_id + '\')">Dodaj uwage</button>' +
                                '</div>' : '') +
                            '<div id="comment-' + p.proposal_id + '" class="comment-input" style="display:none">' +
                            '<textarea placeholder="Twoja uwaga..."></textarea>' +
                            '<button class="btn btn-detail" onclick="submitComment(\'' + p.proposal_id + '\')">Wyslij</button></div>' +
                            (commentsHtml ? '<div class="comments-list">' + commentsHtml + '</div>' : '') +
                            '</div>';
                    }).join('');
                })
                .catch(() => {
                    document.getElementById('proposals-list').innerHTML =
                        '<div class="empty-state">Nie mozna zaladowac propozycji</div>';
                });
        }

        // Load reports
        function loadReports() {
            fetch('/api/experiments/reports')
                .then(r => r.json())
                .then(reports => {
                    const el = document.getElementById('reports-list');
                    if (!reports.length) {
                        el.innerHTML = '<div class="empty-state">Brak raportow z eksperymentow.</div>';
                        return;
                    }

                    reports.reverse();
                    el.innerHTML = reports.map(r => {
                        const recClass = r.recommendation === 'ADOPT' ? 'rec-adopt' :
                                        r.recommendation === 'REJECT' ? 'rec-reject' : 'rec-inconclusive';

                        const deltasHtml = Object.entries(r.delta_metrics || {}).map(([k,v]) => {
                            const cls = v > 0 ? 'delta-positive' : v < 0 ? 'delta-negative' : '';
                            const sign = v > 0 ? '+' : '';
                            return '<div class="metric-item"><div class="metric-label">' + k + '</div>' +
                                '<div class="metric-delta ' + cls + '">' + sign + v.toFixed(3) + '</div></div>';
                        }).join('');

                        return '<div class="card">' +
                            '<div style="display:flex;justify-content:space-between;align-items:center">' +
                            '<div><span class="' + recClass + '">' + r.recommendation + '</span> ' +
                            '<span style="color:#888;font-size:0.8em">' + r.report_id + '</span></div>' +
                            '<span class="proposal-meta">' + formatTime(r.timestamp) + '</span></div>' +
                            '<div class="proposal-change">' + r.parameter_id + ': ' + r.baseline_value + ' &rarr; ' + r.test_value + '</div>' +
                            '<div class="proposal-hypothesis">' + r.hypothesis + '</div>' +
                            '<div class="proposal-meta">' + r.conclusion + '</div>' +
                            '<div class="proposal-meta">Pewnosc: ' + (r.confidence * 100).toFixed(0) + '% | ' +
                            'Cykli: ' + r.test_cycles + ' | Czas: ' + Math.round(r.duration_sec) + 's</div>' +
                            (deltasHtml ? '<div class="metrics-grid">' + deltasHtml + '</div>' : '') +
                            '<a href="/api/experiments/export/' + r.report_id + '" class="btn btn-detail" style="display:inline-block;margin-top:8px;text-decoration:none">Export JSON</a>' +
                            '</div>';
                    }).join('');
                })
                .catch(() => {
                    document.getElementById('reports-list').innerHTML =
                        '<div class="empty-state">Nie mozna zaladowac raportow</div>';
                });
        }

        // Load params
        function loadParams() {
            fetch('/api/experiments/params')
                .then(r => r.json())
                .then(params => {
                    const el = document.getElementById('params-list');
                    if (!params.length) {
                        el.innerHTML = '<div class="empty-state">Brak parametrow</div>';
                        return;
                    }

                    const byRisk = {low: [], medium: [], high: []};
                    params.forEach(p => byRisk[p.risk_level].push(p));

                    let html = '';
                    ['low', 'medium', 'high'].forEach(risk => {
                        const items = byRisk[risk];
                        if (!items.length) return;
                        const riskClass = 'risk-' + risk;
                        html += '<h3 class="' + riskClass + '" style="margin:15px 0 10px">' +
                            risk.toUpperCase() + ' RISK (' + items.length + ')</h3>';
                        html += '<table class="params-table"><tr>' +
                            '<th>Parametr</th><th>Wartosc</th><th>Zakres</th><th>Metryka</th><th>Opis</th></tr>';
                        items.forEach(p => {
                            html += '<tr><td style="font-family:monospace;font-size:0.85em">' + p.param_id + '</td>' +
                                '<td><strong>' + p.current_value + '</strong></td>' +
                                '<td>' + p.min_value + ' - ' + p.max_value + ' (step ' + p.step + ')</td>' +
                                '<td>' + p.impact_metric + '</td>' +
                                '<td style="color:#888">' + p.description + '</td></tr>';
                        });
                        html += '</table>';
                    });

                    el.innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('params-list').innerHTML =
                        '<div class="empty-state">Nie mozna zaladowac parametrow</div>';
                });
        }

        // Initial load
        loadProposals();
        loadReports();
        loadParams();

        // Auto-refresh every 30s
        setInterval(() => { loadProposals(); loadReports(); }, 30000);
    </script>
</body>
</html>
