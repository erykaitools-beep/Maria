{% extends "base.html" %}
{% block title %}Experiments{% endblock %}
{% block page_class %}mo-page--experiments{% endblock %}

{% block content %}
<div class="mo-experiments">
  <div class="mo-flex mo-flex-between mo-flex-center mo-mb-3">
    <h2 class="mo-text-xl mo-accent">Experiment System (K11)</h2>
  </div>

  <div class="mo-tabs">
    <button class="mo-tab mo-tab--active" data-tab="tab-proposals">Propozycje</button>
    <button class="mo-tab" data-tab="tab-reports">Raporty</button>
    <button class="mo-tab" data-tab="tab-params">Parametry</button>
  </div>

  <div class="mo-tab-content mo-tab-content--active" id="tab-proposals">
    <div id="proposals-list">
      <div class="mo-empty-state">Ladowanie...</div>
    </div>
  </div>

  <div class="mo-tab-content" id="tab-reports">
    <div id="reports-list">
      <div class="mo-empty-state">Ladowanie...</div>
    </div>
  </div>

  <div class="mo-tab-content" id="tab-params">
    <div id="params-list">
      <div class="mo-empty-state">Ladowanie...</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/experiments.js') }}"></script>
{% endblock %}
