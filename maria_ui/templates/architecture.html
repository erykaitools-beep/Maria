{% extends "base.html" %}
{% block title %}Architecture Map{% endblock %}
{% block body_class %}mo-page--fullbleed{% endblock %}
{% block page_class %}mo-page--fullbleed{% endblock %}

{% block content %}
<div class="mo-arch-layout">
  <!-- Left sidebar -->
  <div class="mo-arch-sidebar">
    <div class="mo-arch-search">
      <input type="text" id="searchInput" placeholder="Search packages, classes, functions...">
    </div>
    <div id="pkgList" style="flex:1;overflow-y:auto"></div>
    <div class="mo-text-xs mo-muted" style="padding:var(--mo-sp-2) var(--mo-sp-3)" id="statsBar">Loading...</div>
  </div>

  <!-- Main area -->
  <div class="mo-arch-main">
    <!-- View tabs -->
    <div style="position:absolute;top:var(--mo-sp-2);left:var(--mo-sp-2);z-index:10">
      <div class="mo-filter">
        <button class="mo-filter__tab mo-filter__tab--active" data-view="graph" onclick="switchView('graph', this)">Graph</button>
        <button class="mo-filter__tab" data-view="pipeline" onclick="switchView('pipeline', this)">Pipeline</button>
        <button class="mo-filter__tab" data-view="dataflow" onclick="switchView('dataflow', this)">Data Flow</button>
      </div>
    </div>

    <!-- Graph view -->
    <div id="view-graph" style="width:100%;height:100%">
      <canvas class="mo-arch-canvas" id="graphCanvas"></canvas>
    </div>

    <!-- Pipeline view -->
    <div id="view-pipeline" style="display:none;padding:var(--mo-sp-8) var(--mo-sp-5);overflow-y:auto;height:100%">
      <div id="pipelineContainer"></div>
    </div>

    <!-- Data flow view -->
    <div id="view-dataflow" style="display:none;padding:var(--mo-sp-8) var(--mo-sp-5);overflow-y:auto;height:100%">
      <div id="dataflowContainer"></div>
    </div>

    <!-- Zoom controls -->
    <div class="mo-arch-controls">
      <button class="mo-btn mo-btn--ghost" onclick="zoomIn()" title="Zoom in">+</button>
      <button class="mo-btn mo-btn--ghost" onclick="zoomOut()" title="Zoom out">-</button>
      <button class="mo-btn mo-btn--ghost" onclick="resetView()" title="Reset">R</button>
    </div>

    <!-- Detail panel -->
    <div class="mo-arch-detail" id="detailPanel">
      <button class="mo-btn mo-btn--ghost" onclick="closeDetail()" style="position:absolute;top:var(--mo-sp-2);right:var(--mo-sp-2)">&times;</button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip" style="display:none;position:absolute;background:var(--mo-bg-secondary);border:1px solid var(--mo-border);border-radius:var(--mo-r-md);padding:var(--mo-sp-2) var(--mo-sp-3);pointer-events:none;z-index:50">
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/architecture.js') }}"></script>
{% endblock %}
