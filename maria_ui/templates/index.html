<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.A.R.I.A.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.5em;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 0.85em;
        }

        /* Status Card - Compact */
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse {
            width: 16px;
            height: 16px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .pulse.warning { background: #ffaa00; }
        .pulse.danger { background: #ff4444; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        .mode-badge {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: bold;
        }

        .mode-ACTIVE { background: #00ff88; color: #000; }
        .mode-REDUCED { background: #ffaa00; color: #000; }
        .mode-SLEEP { background: #6666ff; color: #fff; }
        .mode-SURVIVAL { background: #ff4444; color: #fff; }

        .metrics-row {
            display: flex;
            gap: 20px;
            font-size: 0.85em;
            color: #aaa;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .metric-value {
            color: #00d4ff;
            font-weight: bold;
        }

        .metric-value.warning { color: #ffaa00; }
        .metric-value.danger { color: #ff4444; }

        /* Chat Container */
        .chat-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            height: calc(100vh - 280px);
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 1.1em;
            color: #00d4ff;
        }

        .header-btns {
            display: flex;
            gap: 10px;
        }

        .clear-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #888;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            text-decoration: none;
        }

        .clear-btn:hover, .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .logout-btn {
            color: #ff6666;
        }

        .rate-limit-warning {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
            padding: 8px 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85em;
            margin-bottom: 10px;
            display: none;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #00d4ff;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.maria {
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.system {
            background: rgba(100, 100, 255, 0.2);
            color: #aaa;
            align-self: center;
            font-size: 0.85em;
            padding: 8px 15px;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff6666;
            align-self: center;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .chat-input-container {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        #chatInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        #chatInput:focus {
            border-color: #00d4ff;
        }

        #chatInput::placeholder {
            color: #666;
        }

        #sendBtn {
            background: #00d4ff;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        #sendBtn:hover {
            transform: scale(1.1);
            background: #00b8e6;
        }

        #sendBtn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        #sendBtn svg {
            width: 24px;
            height: 24px;
            fill: #000;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #444;
            font-size: 0.75em;
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 3px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .metrics-row {
                display: none;
            }
            .message {
                max-width: 90%;
            }
            h1 {
                font-size: 2em;
            }
        }

        /* =================================================================
           PROACTIVE NOTIFICATIONS (Toast style)
           ================================================================= */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }

        .notification-toast {
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px 20px;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 4.5s forwards;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .notification-toast:hover {
            transform: translateX(-5px);
        }

        .notification-toast.mode_change {
            border-left: 4px solid #00d4ff;
        }

        .notification-toast.warning {
            border-left: 4px solid #ffaa00;
        }

        .notification-toast.alert {
            border-left: 4px solid #ff4444;
            animation: slideIn 0.3s ease, pulse-alert 1s ease 3;
        }

        .notification-toast.system_info {
            border-left: 4px solid #888;
        }

        .notification-toast.learning_complete {
            border-left: 4px solid #00ff88;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        @keyframes pulse-alert {
            0%, 100% { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(255, 68, 68, 0.5); }
        }

        .notification-title {
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notification-title .icon {
            font-size: 1.1em;
        }

        .notification-toast.mode_change .notification-title { color: #00d4ff; }
        .notification-toast.warning .notification-title { color: #ffaa00; }
        .notification-toast.alert .notification-title { color: #ff4444; }
        .notification-toast.system_info .notification-title { color: #aaa; }
        .notification-toast.learning_complete .notification-title { color: #00ff88; }

        .notification-message {
            color: #ccc;
            font-size: 0.85em;
            line-height: 1.4;
        }

        .notification-time {
            color: #666;
            font-size: 0.7em;
            margin-top: 8px;
        }

        /* System message styling for proactive messages */
        .message.notification {
            background: rgba(0, 212, 255, 0.15);
            border-left: 3px solid #00d4ff;
            color: #ccc;
        }

        .message.notification.warning-msg {
            background: rgba(255, 170, 0, 0.15);
            border-left-color: #ffaa00;
        }

        .message.notification.alert-msg {
            background: rgba(255, 68, 68, 0.15);
            border-left-color: #ff4444;
        }
    </style>
</head>
<body>
    <!-- Notification Container (Toast messages) -->
    <div class="notification-container" id="notificationContainer"></div>

    <div class="container">
        <header>
            <h1>M.A.R.I.A.</h1>
            <p class="subtitle">Meta Analysis Recalibration Intelligence Architecture</p>
        </header>

        <!-- Compact Status Bar -->
        <div class="status-card">
            <div class="status-row">
                <div class="status-left">
                    <div class="pulse" id="pulseIndicator"></div>
                    <span id="statusText">Laczenie...</span>
                    <span class="mode-badge mode-ACTIVE" id="modeBadge">-</span>
                </div>
                <div class="metrics-row">
                    <div class="metric">
                        RAM: <span class="metric-value" id="ramValue">-</span>
                    </div>
                    <div class="metric">
                        CPU: <span class="metric-value" id="cpuValue">-</span>
                    </div>
                    <div class="metric">
                        Uptime: <span class="metric-value" id="uptimeValue">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container">
            <div class="chat-header">
                <span class="chat-title">Rozmowa z Maria</span>
                <div class="header-btns">
                    <a href="/status" class="clear-btn">Status</a>
                    <button class="clear-btn" id="clearBtn">Wyczysc</button>
                    <a href="/logout" class="logout-btn">Wyloguj</a>
                </div>
            </div>

            <div class="rate-limit-warning" id="rateLimitWarning">
                Limit wiadomosci. Poczekaj <span id="waitTime">0</span>s...
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    Polaczono z M.A.R.I.A. Napisz cos, zeby rozpoczac rozmowe.
                </div>
            </div>

            <div class="chat-input-container">
                <input type="text" id="chatInput" placeholder="Napisz wiadomosc..." autocomplete="off">
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>

        <footer>
            <p>M.A.R.I.A. Web UI v0.5 | Proactive Notifications</p>
        </footer>
    </div>

    <script>
        // =====================================================================
        // SOCKET.IO CONNECTION
        // =====================================================================
        const socket = io();
        let isThinking = false;

        socket.on('connect', () => {
            console.log('Connected to server');
            // Load chat history when connected
            loadChatHistory();
        });

        socket.on('connected', (data) => {
            console.log('Maria says:', data.message);
            if (!data.ollama_available) {
                addMessage('system', 'Uwaga: Ollama nie jest dostepna. Chat moze nie dzialac.');
            }
        });

        // Load chat history from server
        async function loadChatHistory() {
            try {
                const response = await fetch('/api/chat/history');
                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    // Clear default message
                    chatMessages.innerHTML = '';

                    // Add all messages from history
                    data.messages.forEach(msg => {
                        addMessage(msg.role, msg.content);
                    });

                    console.log(`Loaded ${data.messages.length} messages from history`);
                }
            } catch (error) {
                console.error('Could not load chat history:', error);
            }
        }

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            addMessage('error', 'Utracono polaczenie z serwerem.');
        });

        socket.on('chat_status', (data) => {
            if (data.status === 'thinking') {
                showTypingIndicator();
            }
        });

        socket.on('chat_response', (data) => {
            hideTypingIndicator();
            isThinking = false;
            updateSendButton();

            if (data.rate_limited) {
                // Show rate limit warning
                showRateLimitWarning(data.wait_seconds);
            } else if (data.success) {
                addMessage('maria', data.message);
            } else {
                addMessage('error', data.error || 'Nieznany blad');
            }
        });

        socket.on('history_cleared', (data) => {
            if (data.success) {
                document.getElementById('chatMessages').innerHTML = '';
                addMessage('system', 'Historia rozmowy wyczyszczona.');
            }
        });

        // =====================================================================
        // PROACTIVE NOTIFICATIONS
        // =====================================================================
        socket.on('proactive_notification', (data) => {
            console.log('Proactive notification received:', data);

            // Show toast notification
            showToastNotification(data);

            // Add to chat as system message
            addNotificationToChat(data);

            // Update UI if mode changed
            if (data.type === 'mode_change' && data.data && data.data.to_mode) {
                updateModeDisplay(data.data.to_mode);
            }
        });

        function showToastNotification(data) {
            const container = document.getElementById('notificationContainer');

            // Get icon based on type
            const icons = {
                'mode_change': '&#9881;',      // gear
                'warning': '&#9888;',          // warning sign
                'alert': '&#9888;',            // warning sign
                'system_info': '&#8505;',      // info
                'learning_complete': '&#10004;' // checkmark
            };

            const toast = document.createElement('div');
            toast.className = `notification-toast ${data.type}`;
            toast.innerHTML = `
                <div class="notification-title">
                    <span class="icon">${icons[data.type] || '&#8505;'}</span>
                    ${escapeHtml(data.title)}
                </div>
                <div class="notification-message">${escapeHtml(data.message)}</div>
                <div class="notification-time">${formatTime(data.timestamp)}</div>
            `;

            // Click to dismiss
            toast.addEventListener('click', () => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            });

            container.appendChild(toast);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 5000);

            // Keep max 5 notifications
            while (container.children.length > 5) {
                container.firstChild.remove();
            }
        }

        function addNotificationToChat(data) {
            const msg = document.createElement('div');

            // Choose class based on type
            let extraClass = '';
            if (data.type === 'warning') extraClass = 'warning-msg';
            if (data.type === 'alert') extraClass = 'alert-msg';

            msg.className = `message notification ${extraClass}`;
            msg.innerHTML = `<strong>${escapeHtml(data.title)}</strong><br>${escapeHtml(data.message)}`;

            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function updateModeDisplay(mode) {
            const modeBadge = document.getElementById('modeBadge');
            modeBadge.textContent = mode;
            modeBadge.className = 'mode-badge mode-' + mode;

            // Update pulse
            const pulse = document.getElementById('pulseIndicator');
            pulse.className = 'pulse';
            if (mode === 'REDUCED') pulse.classList.add('warning');
            if (mode === 'SLEEP' || mode === 'SURVIVAL') pulse.classList.add('danger');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString('pl-PL', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // =====================================================================
        // CHAT FUNCTIONS
        // =====================================================================
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        function addMessage(type, text) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            // Remove existing indicator if any
            hideTypingIndicator();

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(indicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function updateSendButton() {
            sendBtn.disabled = isThinking || isRateLimited;
        }

        // Rate limiting
        let isRateLimited = false;
        let rateLimitTimer = null;

        function showRateLimitWarning(seconds) {
            isRateLimited = true;
            updateSendButton();

            const warning = document.getElementById('rateLimitWarning');
            const waitTimeEl = document.getElementById('waitTime');

            warning.style.display = 'block';
            waitTimeEl.textContent = seconds;

            // Countdown
            if (rateLimitTimer) clearInterval(rateLimitTimer);

            rateLimitTimer = setInterval(() => {
                seconds--;
                waitTimeEl.textContent = seconds;

                if (seconds <= 0) {
                    clearInterval(rateLimitTimer);
                    warning.style.display = 'none';
                    isRateLimited = false;
                    updateSendButton();
                }
            }, 1000);
        }

        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isThinking) return;

            // Add user message to chat
            addMessage('user', message);
            chatInput.value = '';

            // Send to server
            isThinking = true;
            updateSendButton();
            socket.emit('chat_message', { message: message });
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        clearBtn.addEventListener('click', () => {
            socket.emit('clear_history');
        });

        // =====================================================================
        // STATUS POLLING
        // =====================================================================
        function getColorClass(value, warningThreshold, dangerThreshold) {
            if (value >= dangerThreshold) return 'danger';
            if (value >= warningThreshold) return 'warning';
            return '';
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Update status text
                document.getElementById('statusText').textContent =
                    data.alive ? 'Online' : 'Offline';

                // Update mode badge
                const modeBadge = document.getElementById('modeBadge');
                modeBadge.textContent = data.mode;
                modeBadge.className = 'mode-badge mode-' + data.mode;

                // Update pulse indicator
                const pulse = document.getElementById('pulseIndicator');
                pulse.className = 'pulse';
                if (data.mode === 'REDUCED') pulse.classList.add('warning');
                if (data.mode === 'SLEEP' || data.mode === 'SURVIVAL') pulse.classList.add('danger');

                // Update metrics
                if (data.metrics) {
                    const ramEl = document.getElementById('ramValue');
                    const cpuEl = document.getElementById('cpuValue');

                    ramEl.textContent = data.metrics.ram_percent.toFixed(0) + '%';
                    ramEl.className = 'metric-value ' + getColorClass(data.metrics.ram_percent, 70, 85);

                    cpuEl.textContent = data.metrics.cpu_percent.toFixed(0) + '%';
                    cpuEl.className = 'metric-value ' + getColorClass(data.metrics.cpu_percent, 70, 90);

                    document.getElementById('uptimeValue').textContent = data.metrics.uptime;
                }

            } catch (error) {
                console.error('Status fetch error:', error);
                document.getElementById('statusText').textContent = 'Offline';
                document.getElementById('pulseIndicator').className = 'pulse danger';
            }
        }

        // Initial fetch and interval
        fetchStatus();
        setInterval(fetchStatus, 3000);

        // Focus input on load
        chatInput.focus();
    </script>
</body>
</html>
