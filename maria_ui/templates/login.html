<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.A.R.I.A. - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eee;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9em;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1.5em;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            border-color: #00d4ff;
        }

        input[type="password"]::placeholder {
            color: #555;
            letter-spacing: normal;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6666;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            background: #00b8e6;
        }

        button:active {
            transform: scale(0.98);
        }

        .security-note {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
            font-size: 0.75em;
        }

        .lock-icon {
            font-size: 3em;
            margin-bottom: 20px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="lock-icon">&#128274;</div>
        <h1>M.A.R.I.A.</h1>
        <p class="subtitle">Wprowadz PIN aby kontynuowac</p>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="pin">PIN</label>
                <input
                    type="password"
                    id="pin"
                    name="pin"
                    placeholder="****"
                    maxlength="8"
                    autocomplete="off"
                    autofocus
                    required
                >
            </div>

            <button type="submit">Zaloguj</button>
        </form>

        <div class="security-note">
            Sesja lokalna | Dostep tylko z tego urzadzenia
        </div>
    </div>

    <script>
        // Auto-submit when 4 digits entered (optional)
        document.getElementById('pin').addEventListener('input', function(e) {
            if (this.value.length >= 4) {
                // Optional: auto-submit
                // this.form.submit();
            }
        });
    </script>
</body>
</html>
